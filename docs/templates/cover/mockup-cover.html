<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Slide — Square 1080×1080</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

  /* ---- Tokens do index.css ---- */
  :root {
    --primary-300: #FF8A3D;
    --primary-400: #FF7A45;
    --primary-500: #FF6B00;
    --primary-600: #E55A00;

    --bg-light:      #FEFDFB;
    --bg-primary:    #FAF8F3;
    --bg-secondary:  #F5F3EE;
    --bg-tertiary:   #F0EDE8;

    --text-primary:   #141414;
    --text-secondary: #5C5A56;
    --text-muted:     #9A9790;

    --font-heading: 'DM Sans', system-ui, sans-serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --font-code:    'JetBrains Mono', monospace;

    --gradient-accent: linear-gradient(90deg, #FF6B00, #FF8A3D);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  /* ===================== SLIDE — tamanho real 1080×1080 ===================== */
  .slide {
    position: relative;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    border-radius: 0;
    background: var(--bg-primary);
    flex-shrink: 0;
  }

  /* ===== FOTO — direita, 52% da largura ===== */
  .photo-panel {
    position: absolute;
    top: 0; right: 0;
    width: 52%;
    height: 100%;
    overflow: hidden;
  }

  .photo-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* ===== FADE — linear suave, começa mais cedo ===== */
  .fade-overlay {
    position: absolute;
    top: 0; right: 0;
    width: 52%;
    height: 100%;
   
    background: linear-gradient(
      to right,
      var(--bg-primary) 0%,
      #faf8f3e6 15%,
  #faf8f3bf 30%,
  #faf8f380 45%,
  #faf8f340 60%,
  #faf8f320 75%,
  #faf8f310 85%,
  transparent 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  /* ===== CONTEÚDO — esquerda ===== */
  .content-panel {
    position: absolute;
    top: 0; left: 0;
    width: 68%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 72px;
    z-index: 3;
  }

  /* ===== OVERLINE ===== */
  .overline {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .overline-bar {
    width: 3px;
    height: 20px;
    background: var(--primary-500);
    flex-shrink: 0;
    border-radius: 2px;
  }

  .overline-text {
    font-family: var(--font-code);
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--primary-400);
  }

  /* ===== HEADLINE ===== */
  .headline {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 72px;
    color: var(--text-primary);
    line-height: 1.05;
    margin-bottom: 24px;
  }

  .headline .hl { color: var(--primary-500); }

  /* ===== ACCENT BAR ===== */
  .accent-bar {
    width: 64px;
    height: 5px;
    background: var(--gradient-accent);
    border-radius: 3px;
    margin-bottom: 28px;
  }

  /* ===== SUBTITLE ===== */
  .subtitle {
    font-family: var(--font-body);
    font-size: 20px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 36px;
    max-width: 480px;
  }

  /* ===== TAGS ===== */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tag {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 9999px;
    letter-spacing: 0.02em;
  }

  .tag-primary {
    background: rgba(255, 107, 0, 0.12);
    color: var(--primary-500);
  }

  .tag-secondary {
    background: rgba(20, 20, 20, 0.07);
    color: var(--text-secondary);
  }

  /* ===== FOOTER ===== */
  .slide-footer {
    position: absolute;
    bottom: 48px;
    left: 72px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 4;
  }

  .footer-name {
    font-family: var(--font-code);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .footer-sep {
    width: 1px;
    height: 16px;
    background: rgba(255, 107, 0, 0.25);
  }

  .footer-page {
    font-family: var(--font-code);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }
</style>
</head>
<body>

  <div class="slide">

    <!-- Foto -->
    <div class="photo-panel">
      <img src="../../../src/assets/foto-allan-gemini.png" alt="Allan Victor">
    </div>

    <!-- Fade -->
    <div class="fade-overlay"></div>

    <!-- Conteúdo -->
    <div class="content-panel">
      <div class="overline">
        <div class="overline-bar"></div>
        <span class="overline-text">IA · Agentes · SDK</span>
      </div>
      <h2 class="headline">
        Construindo<br><span class="hl">Agentes de IA</span><br>que funcionam
      </h2>
      <div class="accent-bar"></div>
      <p class="subtitle">Do zero ao deploy: arquitetura, ferramentas e padrões de produção para agentes autônomos.</p>
      <div class="tags">
        <span class="tag tag-primary">#IA</span>
        <span class="tag tag-secondary">#Agentes</span>
        <span class="tag tag-secondary">#SDK</span>
        <span class="tag tag-secondary">#Claude</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="slide-footer">
      <span class="footer-name">allan victor</span>
      <div class="footer-sep"></div>
      <span class="footer-page">01 / 08</span>
    </div>

  </div>

</body>
</html>
